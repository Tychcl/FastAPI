{% extends "base.html" %}
{% block script %}
<script src="{{ url_for('static', path='/js/auth/change_password.js') }}"></script>
{% endblock %}
{% block style %}
<link rel="stylesheet" href="{{ url_for('static', path='/css/auth/change_password.css') }}">
{% endblock %}
{% block main %}
<div class="change-box auth-box">
    <h2>Восстановление пароля</h2>
    <form id="changeForm">
        <div class="form-group">
            <label for="new-password">Новый пароль</label>
            <input type="password" class="menu-btn menu-btn--purple" id="new-password" name="new-password" required>
            <span class="error" id="newPasswordError"></span>
        </div>
        <div class="form-group">
            <label for="confirm-password">Подтвердите пароль</label>
            <input type="password" class="menu-btn menu-btn--purple" id="confirm-password" name="confirm-password" required>
            <span class="error" id="confirmError"></span>
        </div>
        <button type="submit" class="menu-btn menu-btn--purple">Сменить пароль</button>
        <div id="FormError" class="error"></div>
    </form>
</div>
{% endblock %}
