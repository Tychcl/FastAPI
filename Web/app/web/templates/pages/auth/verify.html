{% extends "base.html" %}
{% block script %}
<script src="{{ url_for('static', path='/js/auth/verify.js') }}"></script>
{% endblock %}
{% block style %}
<link rel="stylesheet" href="{{ url_for('static', path='/css/auth/verify.css') }}">
{% endblock %}
{% block main %}
<div class="verify-box auth-box">
    <h2>Верификация почты</h2>
    {% if email %}
    <p>Код отправлен на почту: <strong>{{ email }}</strong><br>Время действия кода 10 минут</p>
    {% endif %}
    <form id="verifyForm">
        <div class="form-group">
            <label for="code">Код</label>
            <input class="menu-btn menu-btn--purple" type="number" id="code" name="code" required maxlength="4">
        </div>
        <button type="submit" class="menu-btn menu-btn--purple">Подтвердить</button>
        <div id="FormError" class="error"></div>
    </form>
</div>
{% endblock %}
