{% extends "base.html" %}
{% block script %}
<script src="{{ url_for('static', path='/js/auth/authorize.js') }}"></script>
{% endblock %}
{% block style %}
<link rel="stylesheet" href="{{ url_for('static', path='/css/auth/authorize.css') }}">
{% endblock %}
{% block main %}
<div class="login-box">
    <h2>Авторизация</h2>

    <!-- Вкладки -->
    <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">Вход</button>
        <button class="tab-btn" data-tab="register" onclick="switchTab('register')">Регистрация</button>
    </div>

    <!-- Форма входа -->
    <form id="loginForm" method="post" action="/api/v1/auth/signin" class="tab-content active">
        <div class="form-group">
            <label for="login">Логин</label>
            <input type="text" id="login" name="login" required>
            <span class="error" id="loginError"></span>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required>
            <span class="error" id="passwordError"></span>
        </div>
        <button type="submit">Войти</button>
        <div id="loginFormError" class="error"></div>
    </form>

    <!-- Форма регистрации -->
    <form id="registerForm" method="post" action="/api/v1/auth/signup" class="tab-content">
        <div class="form-group">
            <label for="reg-username">Логин (только латиница)</label>
            <input type="text" id="reg-username" name="reg-username" required>
            <span class="error" id="regUsernameError"></span>
        </div>
        <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" name="reg-email" required>
            <span class="error" id="regEmailError"></span>
        </div>
        <div class="form-group">
            <label for="reg-password">Пароль</label>
            <input type="password" id="reg-password" name="reg-password" required>
            <span class="error" id="regPasswordError"></span>
        </div>
        <div class="form-group">
            <label for="reg-confirm-password">Подтвердите пароль</label>
            <input type="password" id="reg-confirm-password" name="reg-confirm-password" required>
            <span class="error" id="regConfirmError"></span>
        </div>
        <button type="submit">Зарегистрироваться</button>
        <div id="registerFormError" class="error"></div>
    </form>
</div>
{% endblock %}
